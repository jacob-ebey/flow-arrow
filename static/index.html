<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FlowArrow Compiler Demo</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --panel-strong: #eef3f7;
        --text: #17202a;
        --muted: #617080;
        --line: #d6dee6;
        --accent: #16745f;
        --accent-strong: #0f5f4e;
        --danger: #ad3b3b;
        --code: #0f1822;
        --code-bg: #f9fbfc;
      }

      * {
        box-sizing: border-box;
      }

      html {
        height: 100%;
        overflow: hidden;
      }

      body {
        margin: 0;
        height: 100%;
        min-height: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      main {
        display: flex;
        flex-direction: column;
        width: min(1180px, calc(100vw - 32px));
        height: 100vh;
        min-height: 0;
        margin: 0 auto;
        padding: 24px 0;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex: 0 0 auto;
        margin-bottom: 16px;
      }

      .compiler {
        display: flex;
        flex: 1 1 auto;
        flex-direction: column;
        min-height: 0;
      }

      h1 {
        margin: 0;
        font-size: 1.45rem;
        font-weight: 720;
      }

      .status {
        display: inline-flex;
        min-height: 34px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        padding: 0 10px;
        color: var(--muted);
        font-size: 0.92rem;
        white-space: nowrap;
      }

      .status[data-state="ok"] {
        color: var(--accent-strong);
      }

      .status[data-state="error"] {
        color: var(--danger);
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border: 1px solid var(--line);
        border-radius: 8px 8px 0 0;
        flex: 0 0 auto;
        background: var(--panel-strong);
        padding: 10px;
      }

      .tabs {
        display: inline-flex;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
      }

      .tab {
        border: 0;
        border-right: 1px solid var(--line);
        background: transparent;
        color: var(--muted);
        min-height: 34px;
        padding: 0 12px;
        font: inherit;
      }

      .tab:last-child {
        border-right: 0;
      }

      .tab[aria-selected="true"] {
        background: var(--accent);
        color: #ffffff;
        font-weight: 650;
      }

      .tab[aria-selected="false"] {
        color: var(--muted);
      }

      .tab[aria-selected="false"]:hover,
      .target-option[aria-pressed="false"]:hover,
      .icon-button:hover {
        background: var(--panel-strong);
        color: var(--text);
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .target-toggle {
        display: inline-flex;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
      }

      .target-option {
        min-height: 34px;
        border: 0;
        border-right: 1px solid var(--line);
        background: transparent;
        color: var(--muted);
        padding: 0 12px;
        font: inherit;
      }

      .target-option:last-child {
        border-right: 0;
      }

      .target-option[aria-pressed="true"] {
        background: var(--accent);
        color: #ffffff;
        font-weight: 680;
      }

      button {
        cursor: pointer;
      }

      .icon-button {
        display: inline-flex;
        min-width: 64px;
        height: 34px;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        color: var(--text);
        padding: 0 10px;
        font: inherit;
      }

      .compile {
        min-height: 34px;
        border: 1px solid var(--accent-strong);
        border-radius: 6px;
        background: var(--accent);
        color: #ffffff;
        padding: 0 14px;
        font: inherit;
        font-weight: 680;
      }

      .compile:hover {
        background: var(--accent-strong);
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(320px, 0.9fr) minmax(0, 1.1fr);
        grid-template-rows: minmax(0, 1fr);
        flex: 1 1 auto;
        min-height: 0;
        border: 1px solid var(--line);
        border-top: 0;
        border-radius: 0 0 8px 8px;
        overflow: hidden;
        background: var(--panel);
      }

      .compiler:has(.diagnostics:not([hidden])) .workspace {
        border-radius: 0;
      }

      .pane {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: 0;
        min-width: 0;
        overflow: hidden;
      }

      .pane + .pane {
        border-left: 1px solid var(--line);
      }

      .results {
        display: grid;
        grid-template-rows: minmax(0, 0.75fr) minmax(0, 1fr);
        min-height: 0;
        min-width: 0;
        overflow: hidden;
        border-left: 1px solid var(--line);
      }

      .results .pane + .pane {
        border-top: 1px solid var(--line);
        border-left: 0;
      }

      .results[data-mode="typescript"] {
        grid-template-rows: minmax(0, 1fr);
      }

      .results[data-mode="typescript"] .pane[data-output="declarations"] {
        display: none;
      }

      .results[data-mode="typescript"] .pane[data-output="source"] {
        border-top: 0;
      }

      .pane-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 38px;
        border-bottom: 1px solid var(--line);
        padding: 0 12px;
        color: var(--muted);
        font-size: 0.84rem;
        font-weight: 650;
        text-transform: uppercase;
      }

      textarea,
      pre {
        width: 100%;
        height: 100%;
        min-height: 0;
        min-width: 0;
        margin: 0;
        border: 0;
        outline: 0;
        resize: none;
        overflow: auto;
        background: var(--code-bg);
        color: var(--code);
        padding: 16px;
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", ui-monospace, monospace;
        font-size: 0.9rem;
        line-height: 1.52;
        tab-size: 4;
      }

      pre {
        white-space: pre;
      }

      .diagnostics {
        flex: 0 0 auto;
        max-height: min(220px, 28vh);
        border: 1px solid var(--line);
        border-top: 0;
        border-radius: 0 0 8px 8px;
        background: var(--panel);
        overflow: hidden;
      }

      .diagnostics[hidden] {
        display: none;
      }

      .diagnostics summary {
        min-height: 38px;
        padding: 9px 12px;
        border-bottom: 1px solid var(--line);
        color: var(--danger);
        cursor: pointer;
        font-size: 0.9rem;
        font-weight: 680;
      }

      .diagnostics pre {
        max-height: calc(min(220px, 28vh) - 38px);
        height: auto;
        color: var(--danger);
        white-space: pre-wrap;
      }

      @media (max-width: 780px) {
        main {
          width: min(100vw - 20px, 1180px);
          padding: 12px 0;
        }

        header,
        .toolbar {
          align-items: stretch;
          flex-direction: column;
        }

        .actions,
        .tabs,
        .target-toggle {
          width: 100%;
        }

        .tab,
        .target-option {
          flex: 1;
        }

        .status {
          width: 100%;
          white-space: normal;
        }

        .workspace {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(0, 0.95fr) minmax(0, 1.05fr);
          min-height: 0;
        }

        .pane + .pane {
          border-left: 0;
          border-top: 1px solid var(--line);
        }

        .results {
          border-left: 0;
          border-top: 1px solid var(--line);
          min-height: 0;
        }

        .diagnostics {
          max-height: min(190px, 26vh);
        }

        .diagnostics pre {
          max-height: calc(min(190px, 26vh) - 38px);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>FlowArrow</h1>
        <div id="status" class="status" data-state="idle">Loading compiler...</div>
      </header>

      <section class="compiler" aria-label="Compiler">
        <div class="toolbar">
          <div class="tabs" role="tablist" aria-label="Examples">
            <button class="tab" type="button" role="tab" data-example="fib" aria-selected="true">fib.flow</button>
            <button class="tab" type="button" role="tab" data-example="concurrency" aria-selected="false">
              concurrency.flow
            </button>
          </div>
          <div class="actions">
            <div class="target-toggle" role="group" aria-label="Output target">
              <button class="target-option" type="button" data-target="javascript" aria-pressed="true">JavaScript</button>
              <button class="target-option" type="button" data-target="typescript" aria-pressed="false">TypeScript</button>
            </div>
            <button id="reset" class="icon-button" type="button" title="Reset example" aria-label="Reset example">
              Reset
            </button>
            <button id="compile" class="compile" type="button">Compile</button>
          </div>
        </div>
        <div class="workspace">
          <section class="pane" aria-label="FlowArrow source">
            <div class="pane-title">FlowArrow</div>
            <textarea id="source" spellcheck="false"></textarea>
          </section>
          <div id="results" class="results" data-mode="javascript">
            <section class="pane" data-output="declarations" aria-label="TypeScript declarations output">
              <div id="types-output-title" class="pane-title">fib.d.ts</div>
              <pre id="types-output" aria-live="polite"></pre>
            </section>
            <section class="pane" data-output="source" aria-label="JavaScript output">
              <div id="source-output-title" class="pane-title">fib.js</div>
              <pre id="source-output" aria-live="polite"></pre>
            </section>
          </div>
        </div>
        <details id="diagnostics" class="diagnostics" hidden>
          <summary id="diagnostics-summary">Compile Error</summary>
          <pre id="diagnostics-output" aria-live="polite"></pre>
        </details>
      </section>
    </main>

    <script type="module">
      const fibExample = `# Exports a pure Fibonacci node for the browser TypeScript demo.
import std.math { add }

extern node fib(depth: Int) -> result: Int {
    (0, 1) -> repeat<$depth> _fib_step -> ($result, $)
}

node _fib_step(a: Int, b: Int) -> (next_a: Int, next_b: Int) {
    $b       -> $next_a
    ($a, $b) -> add -> $next_b
}
`;

      const concurrencyExample = `# Exposes explicit data-parallel work for the browser demo.
import std.math { add, max, mul }

extern node score_batch(width: Int) -> (total: Int, peak: Int) {
    (1, $width, 1) -> range_step              -> $jobs
    $jobs          -> map score_job           -> $scores
    $scores        -> reduce add(identity: 0) -> $total
    $scores        -> reduce max(identity: 0) -> $peak
}

node score_job(n: Int) -> score: Int {
    ($n, $n)      -> mul -> $square
    ($square, $n) -> add -> $score
}
`;

      const examples = {
        fib: {
          filename: "fib",
          source: fibExample,
        },
        concurrency: {
          filename: "concurrency",
          source: concurrencyExample,
        },
      };

      const decoder = new TextDecoder();
      const encoder = new TextEncoder();
      const status = document.querySelector("#status");
      const source = document.querySelector("#source");
      const results = document.querySelector("#results");
      const typesOutput = document.querySelector("#types-output");
      const typesOutputTitle = document.querySelector("#types-output-title");
      const sourceOutput = document.querySelector("#source-output");
      const sourceOutputTitle = document.querySelector("#source-output-title");
      const compileButton = document.querySelector("#compile");
      const resetButton = document.querySelector("#reset");
      const diagnostics = document.querySelector("#diagnostics");
      const diagnosticsSummary = document.querySelector("#diagnostics-summary");
      const diagnosticsOutput = document.querySelector("#diagnostics-output");
      const exampleButtons = [...document.querySelectorAll(".tab")];
      const targetButtons = [...document.querySelectorAll(".target-option")];

      let wasm = null;
      let target = "javascript";
      let currentExample = "fib";

      source.value = examples[currentExample].source;
      compileButton.disabled = true;

      function setStatus(message, state = "idle") {
        status.textContent = message;
        status.dataset.state = state;
      }

      async function loadCompiler() {
        const response = await fetch(new URL("./flowarrow.wasm", import.meta.url));
        const imports = {};
        if (WebAssembly.instantiateStreaming && response.headers.get("content-type") === "application/wasm") {
          return (await WebAssembly.instantiateStreaming(response, imports)).instance.exports;
        }
        const bytes = await response.arrayBuffer();
        return (await WebAssembly.instantiate(bytes, imports)).instance.exports;
      }

      function readResult() {
        const ptr = wasm.flowarrow_result_ptr();
        const len = wasm.flowarrow_result_len();
        return decoder.decode(new Uint8Array(wasm.memory.buffer, ptr, len));
      }

      function clearDiagnostics() {
        diagnostics.hidden = true;
        diagnostics.open = false;
        diagnosticsOutput.textContent = "";
      }

      function showDiagnostics(title, message) {
        diagnosticsSummary.textContent = title;
        diagnosticsOutput.textContent = message;
        diagnostics.hidden = false;
        diagnostics.open = true;
      }

      function clearOutputs() {
        typesOutput.textContent = "";
        sourceOutput.textContent = "";
      }

      function compile() {
        if (!wasm) return;
        const bytes = encoder.encode(source.value);
        const ptr = wasm.flowarrow_alloc(bytes.length);
        new Uint8Array(wasm.memory.buffer, ptr, bytes.length).set(bytes);
        try {
          const ok =
            target === "javascript"
              ? wasm.flowarrow_compile_javascript_artifacts(ptr, bytes.length, 1)
              : wasm.flowarrow_compile_typescript(ptr, bytes.length, 1);
          const result = readResult();
          if (!ok) {
            clearOutputs();
            showDiagnostics("Compile Error", result);
          } else if (target === "javascript") {
            const separator = result.indexOf("\0");
            clearDiagnostics();
            typesOutput.textContent = separator >= 0 ? result.slice(0, separator) : "";
            sourceOutput.textContent = separator >= 0 ? result.slice(separator + 1) : result;
          } else {
            clearDiagnostics();
            typesOutput.textContent = "";
            sourceOutput.textContent = result;
          }
          setStatus(ok ? "Compiled" : "Compile error", ok ? "ok" : "error");
        } finally {
          wasm.flowarrow_dealloc(ptr, bytes.length);
        }
      }

      function setTarget(nextTarget) {
        target = nextTarget;
        results.dataset.mode = nextTarget;
        updateOutputTitles();
        for (const button of targetButtons) {
          button.setAttribute("aria-pressed", String(button.dataset.target === nextTarget));
        }
        compile();
      }

      function setExample(nextExample) {
        currentExample = nextExample;
        source.value = examples[nextExample].source;
        for (const button of exampleButtons) {
          button.setAttribute("aria-selected", String(button.dataset.example === nextExample));
        }
        updateOutputTitles();
        compile();
      }

      function updateOutputTitles() {
        const filename = examples[currentExample].filename;
        typesOutputTitle.textContent = `${filename}.d.ts`;
        sourceOutputTitle.textContent = target === "javascript" ? `${filename}.js` : `${filename}.ts`;
      }

      compileButton.addEventListener("click", compile);
      resetButton.addEventListener("click", () => {
        source.value = examples[currentExample].source;
        compile();
      });
      for (const button of exampleButtons) {
        button.addEventListener("click", () => setExample(button.dataset.example));
      }
      for (const button of targetButtons) {
        button.addEventListener("click", () => setTarget(button.dataset.target));
      }

      try {
        wasm = await loadCompiler();
        compileButton.disabled = false;
        setStatus("Compiler ready", "ok");
        compile();
      } catch (error) {
        setStatus("Compiler failed to load", "error");
        clearOutputs();
        showDiagnostics("Compiler Load Error", error instanceof Error ? error.message : String(error));
      }
    </script>
  </body>
</html>
