name: Pages

on:
  push:
    branches:
      - main
    paths:
      - Cargo.toml
      - Cargo.lock
      - src/**
      - static/**
      - .github/workflows/pages.yml
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Static Site
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-unknown-unknown

      - name: Build WASM compiler
        run: cargo build --lib --target wasm32-unknown-unknown --release

      - name: Copy WASM artifact
        run: cp target/wasm32-unknown-unknown/release/flowarrow.wasm static/flowarrow.wasm

      - name: Verify static site artifact
        run: test -s static/index.html && test -s static/flowarrow.wasm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: static

  deploy:
    name: Deploy Static Site
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
